<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Tharitha ❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Oyeeee ❤️</h1>
    <p class="subtitle">I made something for you…</p>

    <!-- GAME -->
    <div id="gameBox">
    <h3>Catch me 5 times 😏</h3>
    <p id="scoreText">Score: 0 / 5</p>

    <button id="targetBtn">Tap Me 😜</button>
</div>
    <!-- LETTER -->
    <div id="letterBox" class="hidden">
        <p id="letter"></p>
    </div>
</div>

<!-- SLIDESHOW -->
<div id="slideshow">
    <div id="slideContainer">
        <img id="slideImg" src="" alt="memory">
        <p class="caption"></p>
    </div>
</div>
<!-- POPUP -->
<div id="popup">
    <div class="popup-content">
        <h2>❤️ One last thing…</h2>
        <p>You really mean a lot to me, more than I say.</p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
